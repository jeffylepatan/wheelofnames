<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Summary Roulette</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .spin-transition {
            transition: transform 4s cubic-bezier(0.15, 0.85, 0.25, 1);
        }
        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop-in {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        #panelBody {
            transition: width 0.3s ease, padding 0.3s ease, opacity 0.3s ease;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-6 font-sans">

    <!-- Floating Participants Panel -->
    <div id="sidePanel" class="fixed top-1/2 -translate-y-1/2 right-0 z-30 flex items-stretch">
        <!-- Toggle Tab -->
        <button id="panelToggle"
            class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xs tracking-widest writing-mode-vertical px-2 py-5 rounded-l-2xl shadow-lg transition-colors flex items-center justify-center"
            title="Toggle participants panel"
            style="writing-mode: vertical-rl; text-orientation: mixed; letter-spacing: 0.15em;">
            PARTICIPANTS
        </button>
        <!-- Panel Body -->
        <div id="panelBody" class="bg-white shadow-2xl border border-slate-100 p-5 w-72 flex flex-col gap-4 rounded-l-3xl">
            <h2 class="text-base font-bold text-slate-700">Participants</h2>

            <!-- Add name input -->
            <div class="flex gap-2">
                <input id="nameInput" type="text" placeholder="Enter a name…"
                    class="flex-1 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 transition" />
                <button id="addBtn"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-3 py-2 rounded-xl text-sm transition">
                    Add
                </button>
            </div>

            <!-- Name tags list -->
            <div id="namesList" class="flex flex-wrap gap-2 overflow-y-auto max-h-[60vh]"></div>

            <p id="emptyMsg" class="text-slate-400 text-xs hidden">Add at least 2 names to spin.</p>
        </div>
    </div>

    <!-- Header -->
    <div class="text-center mb-8">
        <h1 class="text-4xl md:text-5xl font-extrabold text-slate-800 tracking-tight mb-2">Meeting Roulette</h1>
        <p class="text-slate-500 text-lg">Who will summarize today's meeting?</p>
    </div>

    <!-- Wheel + Spin Button (centered) -->
    <div class="flex flex-col items-center">
        <div class="relative w-full max-w-[480px] aspect-square mb-6">
            <!-- Pointer -->
            <div class="absolute -top-6 left-1/2 -translate-x-1/2 w-0 h-0
                        border-x-[20px] border-x-transparent
                        border-t-[40px] border-t-rose-500
                        z-10 filter drop-shadow-md"></div>
            <!-- Wheel Canvas -->
            <div class="rounded-full overflow-hidden shadow-2xl border-4 border-white bg-white w-full h-full">
                <canvas id="wheel" width="800" height="800" class="w-full h-full spin-transition origin-center"></canvas>
            </div>
        </div>

        <button id="spinBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-12 rounded-full text-xl shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-1 active:translate-y-0 disabled:opacity-50 disabled:cursor-not-allowed">
            Spin the Wheel!
        </button>
    </div>

    <!-- Modal Overlay -->
    <div id="modalOverlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-40 hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div id="modalContent" class="bg-white rounded-3xl p-8 md:p-10 max-w-md w-full shadow-2xl text-center transform scale-95 transition-transform duration-300">
            <div class="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-10 h-10 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h2 class="text-3xl font-extrabold text-slate-800 mb-4">
                Congratulations <span id="winnerName" class="text-indigo-600"></span>!
            </h2>
            <p class="text-lg text-slate-600 mb-8 font-medium">
                Please give us a summary of the meeting.
            </p>
            <button id="closeBtn" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-800 font-semibold py-3 px-6 rounded-xl transition-colors">
                Close & Continue
            </button>
        </div>
    </div>

    <script>
        let names = ['Jessie', 'Manny', 'Mike', 'Mark', 'Divina', 'Nik', 'Jul'];
        const colors = ['#FF595E', '#FFCA3A', '#8AC926', '#1982C4', '#6A4C93', '#F15BB5', '#00BBF9'];

        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const nameInput = document.getElementById('nameInput');
        const addBtn = document.getElementById('addBtn');
        const namesList = document.getElementById('namesList');
        const emptyMsg = document.getElementById('emptyMsg');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalContent = document.getElementById('modalContent');
        const closeBtn = document.getElementById('closeBtn');
        const winnerNameSpan = document.getElementById('winnerName');

        const W = canvas.width;
        const H = canvas.height;
        const cx = W / 2, cy = H / 2, radius = W / 2;

        let currentRotation = 0;
        let isSpinning = false;

        function drawWheel() {
            ctx.clearRect(0, 0, W, H);

            if (names.length === 0) {
                ctx.fillStyle = '#e2e8f0';
                ctx.beginPath();
                ctx.arc(cx, cy, radius, 0, 2 * Math.PI);
                ctx.fill();
                ctx.fillStyle = '#94a3b8';
                ctx.font = 'bold 40px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('Add names', cx, cy);
                return;
            }

            const sliceAngle = (2 * Math.PI) / names.length;
            const fontSize = names.length <= 8 ? 45 : names.length <= 14 ? 34 : 26;

            for (let i = 0; i < names.length; i++) {
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, radius, i * sliceAngle, (i + 1) * sliceAngle);
                ctx.fillStyle = colors[i % colors.length];
                ctx.fill();
                ctx.lineWidth = 4;
                ctx.strokeStyle = '#ffffff';
                ctx.stroke();

                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(i * sliceAngle + sliceAngle / 2);
                ctx.textAlign = 'right';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#ffffff';
                ctx.font = `bold ${fontSize}px sans-serif`;
                ctx.fillText(names[i], radius - 60, 0);
                ctx.restore();
            }

            // Center hub
            ctx.beginPath();
            ctx.arc(cx, cy, 40, 0, 2 * Math.PI);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            ctx.lineWidth = 8;
            ctx.strokeStyle = '#f8fafc';
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(cx, cy, 25, 0, 2 * Math.PI);
            ctx.fillStyle = '#e2e8f0';
            ctx.fill();
        }

        function renderNameTags() {
            namesList.innerHTML = '';
            names.forEach((name, i) => {
                const tag = document.createElement('div');
                tag.className = 'flex items-center gap-1 text-sm font-medium text-white px-3 py-1 rounded-full';
                tag.style.backgroundColor = colors[i % colors.length];
                tag.innerHTML = `
                    <span>${name}</span>
                    <button data-index="${i}" class="remove-btn ml-1 text-white/80 hover:text-white font-bold leading-none text-base" title="Remove">&times;</button>
                `;
                namesList.appendChild(tag);
            });

            const empty = names.length < 2;
            emptyMsg.classList.toggle('hidden', !empty);
            spinBtn.disabled = empty || isSpinning;
        }

        function addName() {
            const val = nameInput.value.trim();
            if (!val) return;
            names.push(val);
            nameInput.value = '';
            nameInput.focus();
            renderNameTags();
            drawWheel();
        }

        function removeName(index) {
            names.splice(index, 1);
            // Reset wheel rotation so it redraws cleanly
            currentRotation = 0;
            canvas.style.transform = 'rotate(0deg)';
            canvas.style.transition = 'none';
            setTimeout(() => { canvas.style.transition = ''; }, 50);
            renderNameTags();
            drawWheel();
        }

        function spin() {
            if (isSpinning || names.length < 2) return;
            isSpinning = true;
            spinBtn.disabled = true;

            const winnerIndex = Math.floor(Math.random() * names.length);
            const sliceAngleDeg = 360 / names.length;
            const centerOfWinner = winnerIndex * sliceAngleDeg + sliceAngleDeg / 2;
            let targetRotation = 270 - centerOfWinner;
            if (targetRotation < 0) targetRotation += 360;

            const randomOffset = (Math.random() - 0.5) * sliceAngleDeg * 0.7;
            targetRotation += randomOffset;

            const remainder = currentRotation % 360;
            let addedRotation = targetRotation - remainder;
            if (addedRotation < 0) addedRotation += 360;

            currentRotation += (360 * 5) + addedRotation;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                showModal(names[winnerIndex]);
                isSpinning = false;
                spinBtn.disabled = names.length < 2;
            }, 4100);
        }

        function showModal(name) {
            winnerNameSpan.textContent = name;
            modalOverlay.classList.remove('hidden');
            void modalOverlay.offsetWidth;
            modalOverlay.classList.remove('opacity-0');
            modalContent.classList.remove('scale-95');
            modalContent.classList.add('animate-pop-in');
        }

        function closeModal() {
            modalOverlay.classList.add('opacity-0');
            modalContent.classList.add('scale-95');
            modalContent.classList.remove('animate-pop-in');
            setTimeout(() => { modalOverlay.classList.add('hidden'); }, 300);
        }

        // Side panel toggle
        const panelToggle = document.getElementById('panelToggle');
        const panelBody = document.getElementById('panelBody');
        let panelOpen = true;

        panelToggle.addEventListener('click', () => {
            panelOpen = !panelOpen;
            panelBody.style.display = panelOpen ? '' : 'none';
        });

        // Event listeners
        spinBtn.addEventListener('click', spin);
        closeBtn.addEventListener('click', closeModal);

        addBtn.addEventListener('click', addName);
        nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') addName(); });

        namesList.addEventListener('click', e => {
            const btn = e.target.closest('.remove-btn');
            if (btn) removeName(Number(btn.dataset.index));
        });

        // Init
        renderNameTags();
        drawWheel();
    </script>
</body>
</html>
